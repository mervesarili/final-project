<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kortly</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>


  <main>



    
<section id="manage-view" class="manage-layout">
      
      <div class="container add-card-container">
        <button id="buttonaddcard" class="circle-btn">
          ADD<br>A NEW<br>CARD
        </button>
        
        <form id="add-form" style="display: none;">
          <input type="text" id="question-input" placeholder="Question">
          <input type="text" id="answer-input" placeholder="Answer">
          <button type="submit">Save</button>
        </form>
      </div>
        
 <div class="container list-container">
        <ul id="cardlist"> 
        
        </ul> 
      </div>

    <ul id="cardlist"> 
<ul id="cardlist"> 
         
    </ul> 

  </div>

  <div class="container menu-container"> 
        <h1>Kortly</h1>
        
        <button id="buttonlonewolf" class="menu-btn"> 

          LONE WOLF

        </button>
        
        <button id="buttonplay" class="menu-btn">

          PLAY WITH A FRIEND

        </button>
      </div> 
 
<section id="study-view" class="hidden study-section">
      
      <div class="study-header">
        <h2 id="progress-text" class="progress-title">1/10</h2>
      </div>

      <div class="study-board">
        
        <div class="board-side">
          <button id="buttonfalse" class="eval-btn incorrect-bg">✖</button>
          <p class="eval-label bold">false</p>
        </div>

        <div class="card" id="flashcard">
          <div class="card-inner">
            <div class="card-front">
              <h2 id="card-question"></h2>
            </div>
            <div class="card-back hidden">
              <h2 id="card-answer"></h2>
            </div>
          </div>
        </div>

        <div class="board-side">
          <button id="buttontrue" class="eval-btn correct-bg">✔</button>
          <p class="eval-label bold">true</p>
        </div>

      </div>

      <div class="study-footer">
        <div class="flip-action">
          <button id="flip-btn" class="flip-btn">Click here to flip the flashcard</button>
          <span class="flip-label"></span>
        </div>

        <div class="shuffle-action">
           <button id="shuffle-btn" class="shuffle-btn">Shuffle Cards</button>
          <span class="shuffle-label"></span>
         
        </div>
      </div>

    </section>

  </main>





    <!-- ── VIEW: MANAGE DECK ──────────────────────────────────────
         This is the screen where the user builds their deck.

         Think about including:
           - A form with a "question" field, an "answer" field,
             and a submit button to add the card
           - A list that shows all the cards added so far,
             with a delete button on each one
           - A "Start Studying" button (disabled when deck is empty)

         When the user clicks "Start Studying", hide this section
         and show the study section below — or navigate to a second
         HTML page. Your team decides.

         Option A — single page, two sections in this file.
           Both sections exist in the HTML at the same time; you
           hide one and show the other with JavaScript when the
           user clicks a button:

             // in your CSS:
             .hidden { display: none; }

             // in your JS:
             function showView(viewId) {
               document.getElementById("manage-view").classList.add("hidden");
               document.getElementById("study-view").classList.add("hidden");
               document.getElementById(viewId).classList.remove("hidden");
             }

             // then call it like:
             showView("study-view");   // switch to study
             showView("manage-view");  // switch back

      
    -->


    <!-- ── VIEW: STUDY SESSION ────────────────────────────────────
         This is the screen shown during a learning session.

         Think about including:
           - A visual "card" the user can click to flip and reveal
             the answer (the flip itself is done with CSS — see
             styles.css for hints on where to start)
           - Buttons to mark the card correct or incorrect,
             shown only after the card is flipped
           - A way to see how many cards are left
           - A "Back" or "End session" button

    <section id="study-view">

    </section>
    -->

</body>
</html>
